---
- name: Deploy RunCalc Pro
  hosts: prod
  become: yes

  vars_files:
    - vault_vars.yml

  tasks:
    - name: Wait for yum lock to be released
      shell: |
        while sudo fuser /var/run/yum.pid >/dev/null 2>&1; do
          echo "Waiting for yum lock..."
          sleep 5
        done

    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Pull Docker image
      shell: docker pull {{ image_tag }}

    - name: Stop existing container
      shell: docker stop runcalc || true

    - name: Remove existing container
      shell: docker rm runcalc || true

    - name: Run new container
      shell: docker run -d -p 80:3000 --name runcalc {{ image_tag }}
